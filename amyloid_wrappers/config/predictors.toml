# Amyloid wrappers configuration
# Edit weights/thresholds here; no code changes required for retuning.

[cache]
# Raw predictor outputs are copied to: {root}/{protein_id}/{predictor}/raw.{ext}
root = "cache"
enabled = true

[metascore]
# Phase 5: weighted per-residue score from normalised predictor columns.
# method = "weighted_sum"  — linear combination (see core/metascore.py)
method = "weighted_sum"

# Weights must sum to 1.0. Keys match predictor registry (schema.py).
# Defaults below are equal; run scripts/calibrate_weights.py against a wide
# merged CSV + metascores/*_metascore_table.csv to refine.
[metascore.weights]
aggreprot = 0.125
aggrescan = 0.125
appnn = 0.125
archcandy = 0.125
crossbeta = 0.125
pasta = 0.125
path = 0.125
waltz = 0.125

[predictors.path]
threshold_percentile = 75.0

[predictors.appnn]
score_threshold = 0.5

[predictors.pasta]
energy_threshold = -5.0

[predictors.aggreprot]
aggregation_threshold = 0.25

[predictors.crossbeta]
confidence_threshold = 0.5

[predictors.archcandy]
# Region-based; no scalar threshold

[predictors.waltz]
# Binary when score != 0

[runners.path]
# Path to path1.1py from https://github.com/KubaWojciechowski/PATH
# Override with AMYLOID_PATH_SCRIPT env var.
script = ""
python = "python3"
results_filename = "results.csv"
# 0 = no timeout (PATH can run for hours on long proteins)
timeout_seconds = 0

[runners.appnn]
rscript = "Rscript"
# Default: package legacy/appnn_converter.R (override with AMYLOID_APPNN_SCRIPT)
converter_script = ""
output_dir = "APPNN_parsed"
timeout_seconds = 0
