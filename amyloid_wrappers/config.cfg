# Amyloid wrappers configuration
# Edit weights/thresholds here; no code changes required for retuning.

[cache]
# Raw copies: cache/{protein_id}/{predictor}/raw.{ext} (only with CLI --keep-cache)
root = cache
enabled = false

[metascore]
method = weighted_sum
# Active preset (override with AMYLOID_METASCORE_PRESET env var):
preset = predictor_specificity

# Metascore uses 7 predictors; AggreProt is parsed/merged but not weighted yet.
# Keys match predictor registry (schema.py).

[metascore.presets.functional_amyloids]
# Functional amyloid emphasis — higher WALTZ / PATH / APPNN / PASTA
waltz = 0.24
path = 0.22
appnn = 0.20
crossbeta = 0.10
pasta = 0.16
archcandy = 0.05
aggrescan = 0.03

[metascore.presets.pathogenic_amyloids]
# Pathogenic amyloid emphasis — higher Cross-Beta / APPNN / PATH
waltz = 0.17
path = 0.18
appnn = 0.19
crossbeta = 0.20
pasta = 0.14
archcandy = 0.08
aggrescan = 0.04

[metascore.presets.predictor_specificity]
# Conservative weights by tool specificity (default)
waltz = 0.22
path = 0.20
appnn = 0.19
crossbeta = 0.15
pasta = 0.15
archcandy = 0.06
aggrescan = 0.03

[predictors.path]
threshold_percentile = 75.0

[predictors.appnn]
score_threshold = 0.5

[predictors.pasta]
energy_threshold = -5.0

[predictors.aggreprot]
aggregation_threshold = 0.25

[predictors.crossbeta]
confidence_threshold = 0.5

[predictors.archcandy]
# Region-based; no scalar threshold

[predictors.waltz]
# Binary when score != 0

[runners.path]
# Default: vendor/PATH/path1.1.py (bundled). Use conda env `wrappers` (see environment.yml).
# Override: AMYLOID_PATH_SCRIPT, AMYLOID_PATH_PYTHON
script =
python = python3
results_filename = results.csv
# 0 = no timeout (PATH can run for hours on long proteins)
timeout_seconds = 0

[runners.appnn]
rscript = Rscript
# Default: package legacy/appnn_converter.R (override with AMYLOID_APPNN_SCRIPT)
converter_script =
output_dir = APPNN_parsed
timeout_seconds = 0
