# Conda environment for amyloid_wrappers + vendored PATH.
#
# New env:
#   conda env create -f environment.yml
#   conda activate wrappers
#   pip install -e ".[test]"
#   pip install pyrosetta --find-links https://west.rosettacommons.org/pyrosetta/quarterly/release
#   export KEY_MODELLER="YOUR_KEY"   # Modeller license — see README
#
# Existing env (add missing tools only):
#   conda activate wrappers
#   conda env update -f environment.yml --prune
#   pip install -e ".[test]"

name: wrappers
channels:
  - salilab
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - modeller=10.8
  - pip
  - pip:
      - -r requirements.txt
